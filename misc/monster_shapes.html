// Canvas dimensions
const DI    = 1;
const CW    = 240;
const CH    = 170;
const CX    = 120;   // monster x-center in canvas
const GND_Y = 148;   // ground level (dy=0, standard coords)
const CEIL_Y = GND_Y - 94;  // ceiling level (dy=0, GND coords), di=1: b1-t1=126-32=94

function render(canvas, shape) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, CW, CH);

  // Background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, CW, CH);

  // Faint grid lines (ground + ceiling)
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(0, GND_Y);  ctx.lineTo(CW, GND_Y);  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, CEIL_Y); ctx.lineTo(CW, CEIL_Y); ctx.stroke();
  ctx.setLineDash([]);

  // Center line
  ctx.strokeStyle = '#1a1a1a';
  ctx.beginPath(); ctx.moveTo(CX, 0); ctx.lineTo(CX, CH); ctx.stroke();

  // Shape
  ctx.strokeStyle = '#00ff44';
  ctx.fillStyle   = '#00ff44';
  ctx.lineWidth   = 1.5;

  let penX = CX, penY = GND_Y;

  for (let i = 0; i < shape.length; i += 3) {
    const cmd = shape[i];
    if (cmd === SC_END) break;

    const dx = shape[i+1];
    const dy = shape[i+2];
    const isGnd = (cmd === SC_GNDMOVE || cmd === SC_GNDDRAW);

    const cx = CX    + dx / DI;
    const cy = (isGnd ? CEIL_Y : GND_Y) + dy / DI;

    if (cmd === SC_MOVE || cmd === SC_GNDMOVE) {
      penX = cx; penY = cy;
    } else if (cmd === SC_DOT) {
      ctx.fillRect(cx - 2, cy - 2, 4, 4);
    } else {  // SC_DRAW or SC_GNDDRAW
      ctx.beginPath();
      ctx.moveTo(penX, penY);
      ctx.lineTo(cx, cy);
      ctx.stroke();
      penX = cx; penY = cy;
    }
  }
}

const grid = document.getElementById('grid');
for (const [name, shape] of Object.entries(shapes)) {
  const div = document.createElement('div');
  div.className = 'item';

  const canvas = document.createElement('canvas');
  canvas.width  = CW;
  canvas.height = CH;
  render(canvas, shape);

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = name;

  div.appendChild(canvas);
  div.appendChild(label);
  grid.appendChild(div);
}
